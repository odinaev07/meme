<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Твиттер-Цитатник Furqat</title>
    <!-- Подключаем библиотеку Inter для чистого шрифта -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            padding: 40px; 
            gap: 50px; 
            background-color: #121212; 
            color: #fff; 
            margin: 0;
            min-height: 100vh;
            align-items: center; /* Центрируем весь контент на странице */
            justify-content: center;
        }
        
        /* ЛЕВАЯ СТОРОНА: Панель управления */
        .editor { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            max-width: 400px;
        }
        h2 { margin-top: 0; font-weight: 500; font-size: 20px; color: #aaa; }
        textarea { 
            height: 150px; 
            padding: 15px; 
            font-size: 16px; 
            border-radius: 8px; 
            background: #222; 
            color: #fff; 
            border: 1px solid #444; 
            resize: vertical;
            line-height: 1.4;
        }
        button { 
            padding: 15px 20px; 
            font-size: 16px; 
            font-weight: 600;
            cursor: pointer; 
            background: #1d9bf0; 
            color: white; 
            border: none; 
            border-radius: 30px;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover { background: #1a8cd8; }

        /* ПРАВАЯ СТОРОНА: Превью */
        .preview-container { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        /* ТОТ САМЫЙ КВАДРАТ 1x1 */
        #capture-area {
            width: 1920px;
            height: 2560px;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center; /* ЦЕНТРИРУЕМ КОНТЕНТ ПО ВЕРТИКАЛИ ВНУТРИ КВАДРАТА */
            padding: 50px;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
        }

        /* Заголовок профиля */
        .tweet-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px; /* Чуть уменьшили отступ */
        }

        /* Аватарка (круг) */
        .avatar {
            width: 48px; /* Сделали аватарку чуть меньше */
            height: 48px;
            border-radius: 50%;
            background-color: #333;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Имя и никнейм */
        .user-details {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .user-name {
            font-weight: 700;
            font-size: 17px; /* Уменьшили шрифт имени */
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .verified-badge {
            width: 18px;
            height: 18px;
            fill: #1d9bf0;
        }
        .user-handle {
            color: #71767b;
            font-size: 15px; /* Уменьшили шрифт никнейма */
        }

        /* Основной текст твита */
        .tweet-text { 
            font-size: 19px; /* УМЕНЬШИЛИ РАЗМЕР ШРИФТА ТЕКСТА */
            word-wrap: break-word; 
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="editor">
        <h2>Редактор</h2>
        <textarea id="textInput" placeholder="Напиши что-нибудь...">Fresh outta church ready to FCK</textarea>
        <button onclick="takeScreenshot()">Скачать скриншот 1x1</button>
    </div>

    <div class="preview-container">
        <div id="capture-area">
            <div class="tweet-header">
                <div class="avatar">
                    <!-- Замени ссылку на свою реальную картинку -->
                    <img id="avatarImage" src="avatar.jpg" alt="Furqat">
                </div>
                <div class="user-details">
                    <div class="user-name">
                        Furqat
                        <svg viewBox="0 0 22 22" class="verified-badge"><g><path d="M20.396 11c0 1.66-.76 3.12-1.97 4.18l.71 1.2c.42.7.2 1.6-.49 2.02-.7.42-1.6.2-2.02-.49l-.71-1.21c-1.06 1.21-2.52 1.97-4.18 1.97s-3.12-.76-4.18-1.97l-.71 1.21c-.42.7-1.32.91-2.02.49-.7-.42-.92-1.32-.49-2.02l.71-1.2C3.36 14.12 2.6 12.66 2.6 11c0-1.66.76-3.12 1.97-4.18l-.71-1.2c-.42-.7-.2-1.6.49-2.02.7-.42 1.6-.2 2.02.49l.71 1.21C8.16 3.36 9.62 2.6 11.28 2.6s3.12.76 4.18 1.97l.71-1.21c.42-.7 1.32-.91 2.02-.49.7.42.92 1.32.49 2.02l-.71 1.2c1.21 1.06 1.97 2.52 1.97 4.18zm-5.83-2.01L12.3 11.26l-1.04-.98c-.5-.46-1.27-.44-1.74.06-.46.5-.44 1.27.06 1.74l1.88 1.78c.22.21.5.31.79.31.29 0 .58-.11.8-.32l2.67-2.67c.5-.5.5-1.3 0-1.8-.5-.5-1.3-.5-1.8 0z"></path></g></svg>
                    </div>
                    <div class="user-handle">@odiesmood</div>
                </div>
            </div>
            <div class="tweet-text" id="textOutput">Fresh outta church ready to FCK</div>
        </div>
    </div>

    <script>
        const input = document.getElementById('textInput');
        const output = document.getElementById('textOutput');

        if (input.value) {
            output.textContent = input.value;
        }

        input.addEventListener('input', function() {
            output.textContent = this.value || 'Текст будет здесь...';
        });

        function takeScreenshot() {
            const element = document.getElementById('capture-area');
            html2canvas(element, { scale: 2, backgroundColor: null }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'tweet-1x1.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }
    </script>
</body>
</html>
